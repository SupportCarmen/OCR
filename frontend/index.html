<!DOCTYPE html>
<html lang="th">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Bank Report OCR & Import</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <link rel="stylesheet" href="./src/index.css">
</head>
<body>

    <div class="app-container">
        <div class="app-header">
            <h1><i class="fas fa-file-invoice-dollar"></i> ระบบนำเข้าข้อมูล Credit Card Report</h1>
        </div>

        <div class="upload-section">
            <div class="control-group">
                <label for="bankSelector"><i class="fas fa-university"></i> 1. เลือกธนาคาร (Bank)</label>
                <select id="bankSelector">
                    <option value="BBL">Bangkok Bank (BBL)</option>
                    <option value="KBANK">Kasikornbank (KBANK)</option>
                    <option value="SCB">Siam Commercial Bank (SCB)</option>
                </select>
            </div>
            <div class="control-group">
                <label for="fileInput"><i class="fas fa-cloud-upload-alt"></i> 2. อัปโหลดไฟล์ (Image/PDF)</label>
                <input type="file" id="fileInput" accept="image/*, application/pdf">
            </div>
        </div>

        <div class="action-bar">
            <button id="btnProcess" onclick="processFile()">
                <i class="fas fa-robot"></i> อ่านข้อมูล (AI OCR)
            </button>
            <div class="loader" id="loading"></div>
            <span id="processStatus" class="status-text"></span>
        </div>

        <div class="main-content hidden" id="resultArea">

            <div class="preview-column">
                <h2 class="section-title"><i class="fas fa-image"></i> Preview</h2>
                <div class="preview-frame">
                    <div class="placeholder-text" id="previewPlaceholder">
                        <i class="fas fa-file-image placeholder-icon"></i>
                        <p>ยังไม่มีไฟล์ Preview</p>
                    </div>
                    <img id="documentPreview" class="preview-image" src="" alt="Document Preview">
                    <iframe id="pdfPreview" class="preview-image" style="width: 100%; height: 800px; border: none; display: none; margin-top: 1rem;"></iframe>
                </div>
            </div>

            <div class="data-column">
                <h2 class="section-title"><i class="fas fa-edit"></i> ตรวจสอบและแก้ไขข้อมูล</h2>

                <div class="data-card">
                    <h3 class="card-title"><i class="fas fa-info-circle"></i> ข้อมูลส่วน Header</h3>
                    <div class="header-form" id="headerForm"></div>
                </div>

                <div class="data-card">
                    <h3 class="card-title"><i class="fas fa-list-alt"></i> ข้อมูลรายการ (Detail)</h3>
                    <div class="table-wrapper">
                        <table class="data-table">
                            <thead>
                                <tr id="tableHeader"></tr>
                            </thead>
                            <tbody id="tableBody"></tbody>
                        </table>
                    </div>
                    <button class="btn-add-row" onclick="addRow()">
                        <i class="fas fa-plus-circle"></i> เพิ่มรายการ
                    </button>
                </div>

                <div class="form-actions">
                    <button class="btn-cancel" onclick="cancelProcess()">
                        <i class="fas fa-times"></i> Cancel
                    </button>
                    <button class="btn-submit" onclick="submitData()">
                        <i class="fas fa-paper-plane"></i> Submit Data
                    </button>
                </div>
            </div>
        </div>
    </div>

    <script src="./src/constants/index.js"></script>
</body>
</html>
